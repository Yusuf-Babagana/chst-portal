{% extends 'base.html' %}

{% block title %}Payment - CHSTH Admission Portal{% endblock %}

{% block content %}
<div class="row mt-4">
    <div class="col-md-6 offset-md-3">
        <div class="card">
            <div class="card-header text-center">
                <h4><i class="fas fa-credit-card"></i> Payment</h4>
            </div>
            <div class="card-body text-center">
                <h5>Application Fee</h5>
                <h2 class="text-primary">₦7,500</h2>
                <p class="text-muted">Secure payment via Paystack</p>

                <button id="pay-button" class="btn btn-primary btn-lg btn-block mt-4">
                    <i class="fas fa-lock"></i> Pay Now
                </button>

                <p class="text-muted mt-3 small">
                    <i class="fas fa-shield-alt"></i> Your payment is secure and encrypted
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://js.paystack.co/v1/inline.js"></script>
<script>
    document.getElementById('pay-button').addEventListener('click', function() {
        var handler = PaystackPop.setup({
            key: '{{ paystack_public_key }}',
            email: '{{ email }}',
            amount: {{ amount }},
            ref: '{{ reference }}',
            callback: function(response) {
                fetch('{% url "payment_callback" %}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': '{{ csrf_token }}'
                    },
                    body: JSON.stringify({
                        reference: response.reference
                    })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        window.location.href = '{% url "dashboard" %}';
                    } else {
                        alert('Payment verification failed. Please contact support.');
                    }
                });
            },
            onClose: function() {
                alert('Payment window closed');
            }
        });
        handler.openIframe();
    });
</script>
{% endblock %}
