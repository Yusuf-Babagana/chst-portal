{% extends 'base.html' %}

{% block title %}Payment - CHSTH Admission Portal{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center mb-5" style="min-height: 60vh;">
    <div class="col-md-8 col-lg-6 col-xl-5 mt-4">
        <div class="card border-0 shadow-lg text-center" style="border-radius: 20px;">
            <div class="card-header bg-transparent border-bottom-0 pt-5 pb-0">
                <div class="bg-primary text-white bg-opacity-10 text-primary rounded-circle d-inline-flex justify-content-center align-items-center mb-3 shadow-sm" style="width: 70px; height: 70px;">
                    <i class="fas fa-credit-card fs-3"></i>
                </div>
                <h3 class="fw-bold text-dark">Secure Payment</h3>
            </div>
            <div class="card-body p-4 p-md-5 pt-3">
                <p class="text-muted text-uppercase tracking-widest fw-bold mb-1" style="font-size: 0.8rem;">Application Fee</p>
                <h1 class="display-5 fw-bold text-primary mb-2">₦12,550</h1>
                <p class="text-secondary small mb-4">Secured inline processed by Paystack</p>

                <button id="pay-button" class="btn btn-primary w-100 btn-lg rounded-pill shadow-sm hover-lift mb-3 py-3 fw-bold">
                    <i class="fas fa-lock me-2"></i> Pay Securely Now
                </button>

                <div class="d-flex justify-content-center align-items-center gap-2 mt-4 text-muted small">
                    <i class="fas fa-shield-alt text-success fs-5"></i>
                    <span>Your payment details are end-to-end encrypted.</span>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://js.paystack.co/v1/inline.js"></script>
<script>
    document.getElementById('pay-button').addEventListener('click', function() {
        var handler = PaystackPop.setup({
            key: '{{ paystack_public_key }}',
            email: '{{ email }}',
            amount: {{ amount }},
            ref: '{{ reference }}',
            callback: function(response) {
                fetch('{% url "payment_callback" %}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': '{{ csrf_token }}'
                    },
                    body: JSON.stringify({
                        reference: response.reference
                    })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        window.location.href = '{% url "dashboard" %}';
                    } else {
                        alert('Payment verification failed. Please contact support.');
                    }
                });
            },
            onClose: function() {
                alert('Payment window closed');
            }
        });
        handler.openIframe();
    });
</script>
{% endblock %}
