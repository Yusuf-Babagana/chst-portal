{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Section D - Course Selection{% endblock %}

{% block content %}
<div class="row mt-4">
    <div class="col-md-8 offset-md-2">
        <div class="card">
            <div class="card-header">
                <h4><i class="fas fa-book"></i> Section D: Course Selection</h4>
            </div>
            <div class="card-body">
                <p class="text-muted">Select your first and second choice programs</p>

                <form method="post" novalidate>
                    {% csrf_token %}
                    {{ form|crispy }}

                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-save"></i> Save and Continue
                        </button>
                        <a href="{% url 'dashboard' %}" class="btn btn-secondary btn-lg">
                            <i class="fas fa-arrow-left"></i> Back to Dashboard
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
