<div class="col-md-6 col-lg-4 mb-4">
    <div class="card h-100 border-0 shadow-sm" style="border-radius: 16px;">
        <div class="card-body p-4 position-relative overflow-hidden">
            {% if status %}
                <div class="position-absolute top-0 end-0 mt-3 me-3">
                    <i class="fas fa-check-circle text-success fs-4"></i>
                </div>
            {% endif %}
            
            <div class="mb-3">
                <div class="d-inline-flex justify-content-center align-items-center rounded-3 bg-opacity-10 
                    {% if status %}bg-success text-success{% else %}bg-primary text-primary{% endif %}" 
                    style="width: 50px; height: 50px; font-size: 1.5rem;">
                    <i class="fas fa-{{ icon }}"></i>
                </div>
            </div>
            
            <h5 class="fw-bold mb-3">{{ title }}</h5>
            
            <div class="mt-auto pt-3 border-top border-light">
                {% if status %}
                    <a href="{% url url %}" class="btn btn-sm btn-outline-primary w-100">
                        <i class="fas fa-edit me-2"></i> Update Info
                    </a>
                {% else %}
                    <a href="{% url url %}" class="btn btn-sm btn-primary w-100">
                        <i class="fas fa-arrow-right me-2"></i> Start Section
                    </a>
                {% endif %}
            </div>
        </div>
    </div>
</div>
